name: NEXUS News Bot

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 6 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode (live / morning / summary)"
        required: false
        default: "live"

jobs:
  run-news-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Determine Mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "20" ]; then
            echo "mode=summary" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%H)" = "06" ] && [ "$(date -u +%M)" -lt "15" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          else
            echo "mode=live" >> $GITHUB_OUTPUT
          fi
      - name: Run News Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: python news_bot.py
