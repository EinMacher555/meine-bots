name: NEXUS News Bot

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "live or summary"
        required: false
        default: "live"

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Determine mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "20" ]; then
            echo "mode=summary" >> $GITHUB_OUTPUT
          else
            echo "mode=live" >> $GITHUB_OUTPUT
          fi
      - name: Run NEXUS News Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: python news_bot.py
